name: Update Zeid Data lab console

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "profile/README.md"
      - ".github/scripts/update_threat_radar.py"
      - ".github/workflows/update-threat-radar.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: update-zeid-data-lab-console
  cancel-in-progress: false

jobs:
  update-lab-console:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update organization profile README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZD_OWNER: Zeid-Data
          ZD_README_PATH: profile/README.md
          ZD_KEV_LIMIT: "6"
          ZD_REPO_LIMIT: "8"
          ZD_SHIP_LIMIT: "8"
          ZD_LOOKBACK_DAYS: "7"
        run: python3 .github/scripts/update_threat_radar.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "[PASS] no changes"
            exit 0
          fi

          git config user.name "zeid-data-lab-console-bot"
          git config user.email "actions@github.com"
          git add profile/README.md
          git commit -m "Update Zeid Data lab console"
          git push
