name: Update threat intel radar

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-threat-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch GitHub Advisory Database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/advisories?per_page=10&sort=published&direction=desc&type=reviewed" \
            -o /tmp/advisories.json
          echo "[PASS] advisories fetched"

      - name: Parse advisories and build table
        run: |
          python3 - <<'PYEOF'
          import json
          import sys

          try:
              with open('/tmp/advisories.json', 'r') as f:
                  advisories = json.load(f)
          except (json.JSONDecodeError, IOError, ValueError) as e:
              print(f"ERROR: Failed to parse advisories JSON: {e}", file=sys.stderr)
              sys.exit(1)

          if not isinstance(advisories, list) or not advisories:
              print("ERROR: No advisories found in response", file=sys.stderr)
              sys.exit(1)

          build_map = {
              'KEV watcher item and manual validation checklist': [
                  'remote code', 'code execution', 'rce', 'authentication bypass',
                  'auth bypass', 'improper auth', 'ransomware', 'backdoor',
                  'privilege escalation', 'elevation of privilege',
              ],
              'Route/file exposure audit, web evidence capture, remediation report': [
                  'path traversal', 'directory traversal', 'file inclusion',
                  'file exposure', 'local file', 'lfi', 'rfi',
              ],
              'Patch-priority radar and host-update validation': [
                  'memory corruption', 'buffer overflow', 'use after free',
                  'out-of-bounds', 'integer overflow',
              ],
          }

          def get_build(text):
              t = text.lower()
              for build, keywords in build_map.items():
                  if any(kw in t for kw in keywords):
                      return build
              return 'Manual review item'

          def get_risk_class(text):
              t = text.lower()
              if any(x in t for x in ('remote code', 'rce', 'code execution')):
                  return 'Remote code execution'
              if any(x in t for x in ('authentication bypass', 'auth bypass', 'improper auth')):
                  return 'Authentication bypass'
              if any(x in t for x in ('privilege escalation', 'elevation of privilege')):
                  return 'Privilege escalation'
              if 'command injection' in t:
                  return 'Command injection'
              if any(x in t for x in ('path traversal', 'directory traversal', 'file inclusion')):
                  return 'Path traversal/file exposure'
              if 'sql injection' in t:
                  return 'SQL injection'
              if any(x in t for x in ('memory corruption', 'buffer overflow', 'use after free', 'out-of-bounds')):
                  return 'Memory corruption'
              return 'Security advisory'

          severity_badge = {
              'critical': '![Critical](https://img.shields.io/badge/Critical-red?style=flat-square)',
              'high':     '![High](https://img.shields.io/badge/High-orange?style=flat-square)',
              'medium':   '![Medium](https://img.shields.io/badge/Medium-yellow?style=flat-square)',
              'low':      '![Low](https://img.shields.io/badge/Low-blue?style=flat-square)',
          }

          lines = [
              '| Severity | Advisory | Product | Risk class | Published | CVSS | Zeid Data defensive build | Rationale |',
              '|---|---|---|---|---:|---:|---|---|',
          ]

          for adv in advisories[:10]:
              severity = (adv.get('severity') or 'medium').lower()
              badge = severity_badge.get(severity, severity_badge['medium'])

              ghsa_id = adv.get('ghsa_id', '')
              cve_id = adv.get('cve_id') or ''
              advisory_id = cve_id if cve_id else ghsa_id
              advisory_url = adv.get('html_url', '')
              advisory_cell = f'[`{advisory_id}`]({advisory_url})' if advisory_url else f'`{advisory_id}`'

              summary = adv.get('summary', '')
              vulns = adv.get('vulnerabilities', [])
              if vulns and isinstance(vulns, list) and vulns[0].get('package', {}).get('name'):
                  product = vulns[0]['package']['name']
                  ecosystem = vulns[0]['package'].get('ecosystem', '')
                  product_cell = f'{product} ({ecosystem})' if ecosystem else product
              else:
                  product_cell = summary[:40].split('.')[0] if summary else 'Unknown'

              published = (adv.get('published_at') or '')[:10]

              cvss_data = adv.get('cvss', {}) or {}
              cvss_score = cvss_data.get('score')
              cvss_cell = f'`{cvss_score}`' if cvss_score else 'N/A'

              risk_class = get_risk_class(summary)
              build = get_build(summary)

              if severity == 'critical':
                  rationale = 'RCE/auth bypass or critical severity advisory'
              else:
                  rationale = summary[:80] + ('...' if len(summary) > 80 else '')

              lines.append(
                  f'| {badge} | {advisory_cell} | {product_cell} | {risk_class} '
                  f'| `{published}` | {cvss_cell} | {build} | {rationale} |'
              )

          with open('/tmp/advisory_table.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print(f"[PASS] advisory table written with {min(len(advisories), 10)} entries")
          PYEOF

      - name: Inject table and timestamp into README
        run: |
          python3 - <<'PYEOF'
          import re
          import sys
          from datetime import datetime, timezone

          readme_path = 'profile/README.md'

          try:
              with open(readme_path, 'r') as f:
                  content = f.read()
          except IOError as e:
              print(f"ERROR: Cannot read README: {e}", file=sys.stderr)
              sys.exit(1)

          try:
              with open('/tmp/advisory_table.md', 'r') as f:
                  table = f.read().strip()
          except IOError as e:
              print(f"ERROR: Cannot read advisory table: {e}", file=sys.stderr)
              sys.exit(1)

          pattern = r'<!-- CISA_KEV_TABLE -->.*?(?=\n### What we)'
          replacement = '<!-- CISA_KEV_TABLE -->\n\n' + table + '\n'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          if new_content == content:
              print("ERROR: <!-- CISA_KEV_TABLE --> anchor not found in README", file=sys.stderr)
              sys.exit(1)

          timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          new_content = re.sub(r'Last generated: .*', f'Last generated: {timestamp}', new_content)

          try:
              with open(readme_path, 'w') as f:
                  f.write(new_content)
          except IOError as e:
              print(f"ERROR: Cannot write README: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"[PASS] README updated, timestamp: {timestamp}")
          PYEOF

      - name: Commit if changed
        run: |
          if git diff --quiet profile/README.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore: update threat intel radar [skip ci]"
          git push
