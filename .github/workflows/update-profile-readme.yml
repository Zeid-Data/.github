name: Update organization profile README

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/update_profile_readme.py"
      - "data/now_building.json"
      - "data/defensive_build_map.json"
      - "data/lithium_status.json"
      - ".github/workflows/update-profile-readme.yml"

permissions:
  contents: write

jobs:
  update-profile-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and validate README
        run: |
          python scripts/update_profile_readme.py --readme profile/README.md --check-links

      - name: Commit generated profile files
        run: |
          if [ -z "$(git status --porcelain -- profile/README.md assets/lithium)" ]; then
            echo "No generated changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/README.md assets/lithium
          git commit -m "chore: update static lithium bot status"
          git push
